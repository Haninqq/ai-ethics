name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST || secrets.HOST }}
        username: ${{ secrets.EC2_USERNAME || secrets.USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY || secrets.KEY }}
        port: 22
        script: |
          cd ~/ai-ethics/org.ai-ethics.assessment || cd ~/ai-ethics-assessment || cd /home/ubuntu/ai-ethics-assessment || cd /home/ubuntu/ai-ethics/org.ai-ethics.assessment
          git fetch origin main
          git reset --hard origin/main
          docker compose down || true
          docker compose up --build -d
          docker image prune -f


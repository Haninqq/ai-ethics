version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai_ethics_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_ethics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


services:
  db:
    image: mysql:8.0
    container_name: ai_ethics_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: ai_ethics
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: ai_ethics_adminer
    restart: always
    ports:
      - "8080:8080"

  # backend:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"

volumes:
  mariadb_data:

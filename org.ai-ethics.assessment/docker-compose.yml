services:
  db:
    image: mysql:8.0
    container_name: ai_ethics_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: ai_ethics
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Initial database load from the dumped local snapshot
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: ai_ethics_adminer
    restart: always
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    container_name: ai_ethics_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/static:/app/app/static
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ai_ethics_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
